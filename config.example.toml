github_orgs = ["Inkvi"]
# Add additional owner scopes (orgs and/or user accounts):
# github_orgs = ["polymerdao", "another-org", "Inkvi"]
poll_interval_seconds = 60
excluded_repos = []
enabled_reviewers = ["claude", "codex"]
# Optional Claude tuning:
# claude_backend = "sdk"    # "sdk" (agent SDK, default) or "cli" (claude CLI)
# claude_model = "claude-sonnet-4-5"
# claude_reasoning_effort = "medium"
# Reconciler backend — single string or priority list (tries in order on failure):
reconciler_backend = "claude"
# reconciler_backend = ["claude", "gemini"]  # fallback: try gemini if claude fails
# Optional reconciliation tuning:
# - when reconciler_backend="claude", falls back to claude_* when unset
# - when reconciler_backend="codex", falls back to codex_* when unset
# - when reconciler_backend="gemini", falls back to gemini_model when unset
# reconciler_model = "claude-opus-4-1"
# reconciler_reasoning_effort = "high" # claude: low|medium|high|max, codex: low|medium|high
# codex backend:
# - "cli": uses `codex exec` with the shared full-review prompt (default, stable)
# - "agents_sdk": uses OpenAI Agents SDK with the shared full-review prompt (experimental)
codex_backend = "cli"
codex_model = "gpt-5.3-codex"
# Default Codex tuning for development:
codex_reasoning_effort = "low"
# Optional Gemini tuning (requires `gemini` CLI installed/authenticated.
# Full Gemini review also requires the `code-review` extension unless full_review_prompt_path is set):
# Install extension: gemini extensions install https://github.com/gemini-cli-extensions/code-review
# To enable: add "gemini" to enabled_reviewers, e.g. ["claude", "codex", "gemini"]
# gemini_model = "gemini-3.1-pro-preview"
gemini_timeout_seconds = 900
skip_own_prs = true
auto_post_review = false
auto_submit_review_decision = false
include_reviewer_stderr = true
post_mode = "pr_comment"
output_dir = "./reviews"
state_file = "./.state/pr-reviewer-state.json"
clone_root = "./.tmp/workspaces"
claude_timeout_seconds = 900
codex_timeout_seconds = 900
max_parallel_prs = 1
# Trigger state machine mode:
# - "rerequest_only": process on first bootstrap + new direct re-requests to viewer
# - "rerequest_or_commit": reserved for future commit-trigger support
trigger_mode = "rerequest_only"
# Maximum times a review can restart mid-flight when new commits are pushed (0-5, default 2):
max_mid_review_restarts = 2
# Maximum number of findings the reconciler can include (1-20, default 10):
max_findings = 10
# Maximum number of test gaps the reconciler can include (1-10, default 3):
max_test_gaps = 3
# Slash command trigger — respond to /review comments in monitored org PRs
slash_command_enabled = true
# Prompt injection detection — extracts injection sections from output, logs warnings,
# and rejects malformed output. Disable if you trust your input sources fully.
# prompt_injection_protection = false
# Triage — classifies PRs as simple (lightweight review) or complex (full review)
# Every PR goes through triage; no more hard skips.
triage_backend = "gemini"   # single string or list: ["gemini", "claude"]
# triage_backend = ["gemini", "claude"]  # fallback: try claude if gemini fails
triage_model = "gemini-3-flash-preview"
# Timeout is per-attempt; worst case = N backends x timeout
triage_timeout_seconds = 60
# Optional prompt override TOML for triage:
# Built-in default template: src/code_reviewer/prompt_specs/triage.toml
# triage_prompt_path = "./prompts/triage.toml"
# Lightweight review — single-model checklist review for simple PRs
lightweight_review_backend = "gemini"   # single string or list: ["gemini", "claude"]
# lightweight_review_backend = ["gemini", "claude"]  # fallback: try claude if gemini fails
lightweight_review_model = "gemini-3-flash-preview"
# lightweight_review_reasoning_effort = "low"   # low | medium | high | max
# Timeout is per-attempt; worst case = N backends x timeout
lightweight_review_timeout_seconds = 300
# Optional prompt override TOML for lightweight review:
# Built-in default template: src/code_reviewer/prompt_specs/lightweight_review.toml
# lightweight_review_prompt_path = "./prompts/lightweight_review.toml"
# Optional prompt override TOML for all full-review backends (Claude, Codex, Gemini):
# Built-in default template: src/code_reviewer/prompt_specs/full_review.toml
# full_review_prompt_path = "./prompts/full_review.toml"
# Optional prompt override TOML for reconciliation:
# Built-in default template: src/code_reviewer/prompt_specs/reconcile.toml
# reconcile_prompt_path = "./prompts/reconcile.toml"
# Remote skills — GitHub tree URLs pointing to skill folders with SKILL.md.
# Local skills in skills/ at project root are auto-discovered (no config needed).
# skills = [
#   "https://github.com/org/repo/tree/main/skills/security-review",
#   "https://github.com/org/repo/tree/main/skills/perf-review",
# ]
